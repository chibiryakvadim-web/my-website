<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="container d-flex justify-content-between align-items-center">
        <img src="images/header.png" class="logo">

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </div>
</header>

<!-- BANNER -->
<section class="banner text-center">
    <div class="container">
        <h1>Agridera Seeds and Agriculture Ltd</h1>
        <button class="btn btn-success mt-3">READ MORE</button>
    </div>
</section>

<!-- MAIN -->
<main class="container mt-5">

    <section class="text-center">
        <h2>Main Activity</h2>
        <img src="images/main.jpg" class="img-fluid mt-3">
    </section>

    <section class="text-center">
        <h2>Vision & Mission</h2>
        <img src="images/vision.jpg" class="img-fluid mt-3">
    </section>

    <section class="text-center">
        <h2>Products</h2>

        <div class="row mt-4">
            <div class="col-md-4">
                <img src="images/product1.jpg" class="img-fluid product">
            </div>
            <div class="col-md-4">
                <img src="images/product2.jpg" class="img-fluid product">
            </div>
            <div class="col-md-4">
                <img src="images/product3.jpg" class="img-fluid product">
            </div>
        </div>
    </section>

</main>

<!-- FOOTER -->
<footer class="text-center p-3">
    <p>© 2026 Agridera</p>
</footer>

</body>
</html>
